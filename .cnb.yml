sit:
  push:
    - name: build-and-deploy
      services:
        - docker
      imports: https://cnb.cool/longlian.online/env/-/blob/main/longlian-backend-sit.yml

      stages:
        - name: get latest version tag
          script: echo -n "${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
          exports:
            info: LATEST_VERSION_TAG

        - name: get current version tag
          script: echo -n "${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT}"
          exports:
            info: CURRENT_VERSION_TAG

        - name: build docker image
          script: docker build -f devops/Dockerfile -t $LATEST_VERSION_TAG -t $CURRENT_VERSION_TAG .

        - name: push docker image
          script: docker push $LATEST_VERSION_TAG && docker push $CURRENT_VERSION_TAG

        - name: deploy to server
          image: tencentcom/ssh
          settings:
            host:
              - $REMOTE_HOST
            username: $REMOTE_USERNAME
            password: $REMOTE_PASSWORD
            port: $REMOTE_PORT
            command_timeout: 2m
            script: |
              sudo docker login -u "${CNB_DOCKER_USERNAME}" -p "${CNB_DOCKER_PASSWORD}" "${CNB_DOCKER_URL}"
              sudo docker pull ${LATEST_VERSION_TAG}
              sudo docker stop ${APP_NAME} || true
              sudo docker rm ${APP_NAME} || true
              sudo docker run --network ${NET_WORK} --restart=always -d --name ${APP_NAME} --env-file ${ENV_FILE} -p 8018:8080 ${LATEST_VERSION_TAG}

    - name: api-test
      services:
        - docker
      imports: https://cnb.cool/longlian.online/env/-/blob/main/feishu-notice.yml
      stages:
        - name: run api tests
          script: |
            docker compose -f devops/docker-compose.test.yml up --build --exit-code-from test-runner > /tmp/docker-test.log 2>&1
            TEST_EXIT=$?
            SUMMARY=$(docker compose -f devops/docker-compose.test.yml logs test-runner 2>&1 | grep -oP 'Tests run: \d+, Failures: \d+, Errors: \d+, Skipped: \d+' | tail -1)
            if [ "$TEST_EXIT" -eq 0 ]; then
              RESULT="✅ 全部通过"
            else
              RESULT="❌ 存在失败"
            fi
            echo -n "${RESULT} | ${SUMMARY} | 分支: ${CNB_BRANCH:-N/A} | 提交: ${CNB_COMMIT_SHORT:-N/A}"
          exports:
            info: TEST_RESULT
        - name: send  message
          image: tencentcom/feishu-message
          settings:
            robot: $ROBOT
            content: |
              {
                  "text": "API 测试结果: ${TEST_RESULT}"
              }
