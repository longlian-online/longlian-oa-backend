# ============================================================
# longlian-oa-backend API 测试 Docker 运行环境
#
# 一键运行：
#   docker compose -f devops/docker-compose.test.yml up --build --exit-code-from test-runner
#
# 包含：MySQL 8.0 + Redis 7-Alpine + Maven 测试执行器
# ============================================================

services:
  mysql-test:
    image: mysql:8.0
    container_name: longlian-oa-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: longlian_oa_test
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 15s
    tmpfs: /var/lib/mysql

  redis-test:
    image: redis:7-alpine
    container_name: longlian-oa-redis-test
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  test-runner:
    image: maven:3.9-eclipse-temurin-21
    container_name: longlian-oa-test-runner
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    env_file:
      - ../.env.test
    volumes:
      # 挂载项目源码
      - ..:/app
      # 挂载 settings.xml（阿里云镜像）
      - ../settings.xml:/usr/share/maven/conf/settings.xml
      # 持久化 Maven 依赖缓存
      - maven-repo:/root/.m2
    working_dir: /app
    entrypoint:
      - sh
      - -c
      - >
        mvn -pl app install -Dmaven.test.skip=true -am --no-transfer-progress
        && mvn -pl app test jacoco:report -Dtest=online.longlian.app.api.**

volumes:
  maven-repo:
